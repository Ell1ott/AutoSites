<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Website visual — simple wireframe</title>
  <style>
    :root {
      --lavender-bg: #f3f3ff;
      --lavender-mid: #a5a5e0;
      --lavender-soft: #d8d8f5;
      --chrome: #e8e8ef;
      --white: #ffffff;
      --radius-window: 20px;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--lavender-bg);
      font-family: system-ui, sans-serif;
    }

    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px 96px;
      overflow-x: clip;
    }

    .scene {
      perspective: 1000px;
      perspective-origin: 50% 36%;
      transform-style: preserve-3d;
    }

    .tilt {
      transform-style: preserve-3d;
      transform: rotateY(-26deg) rotateX(13deg) rotateZ(-3deg);
    }

    .browser {
      width: min(720px, 100%);
      transform-style: preserve-3d;
      /*
        Avoid filter/paint containment here — `filter` flattens descendants into a single
        bitmap, which makes child translateZ animating look like fade-only opacity.
       */
      border-radius: var(--radius-window);
    }

    .browser-surface {
      border-radius: var(--radius-window);
      /* Anything other than visible here flattens 3D; looks like fade-only motion. */
      overflow: visible;
      background: var(--white);
      transform-style: preserve-3d;
      border: 1px solid rgba(165, 165, 224, 0.2);
      box-shadow:
        0 2px 0 rgba(210, 210, 250, 0.9),
        -18px 14px 0 rgba(174, 168, 220, 0.15),
        22px 28px 0 rgba(174, 168, 220, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        0 40px 60px rgba(70, 56, 130, 0.12);
    }

    .browser-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--chrome);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      border-radius: calc(var(--radius-window) - 1px) calc(var(--radius-window) - 1px) 0 0;
    }

    .traffic {
      display: flex;
      gap: 6px;
    }

    .traffic i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .traffic i:nth-child(1) {
      background: #ff8a7a;
    }

    .traffic i:nth-child(2) {
      background: #ffd56a;
    }

    .traffic i:nth-child(3) {
      background: #7dd67d;
    }

    .url {
      flex: 1;
      height: 30px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .browser-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #9a96ae;
      font-size: 18px;
      line-height: 1;
      padding-right: 4px;
    }

    .browser-actions span {
      font-weight: 300;
      letter-spacing: -0.05em;
    }

    .page {
      background: var(--lavender-bg);
      padding: 28px 32px 36px;
      transform-style: preserve-3d;
      border-radius: 0 0 calc(var(--radius-window) - 1px) calc(var(--radius-window) - 1px);
    }

    header.row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 32px;
      transform-style: preserve-3d;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--lavender-soft);
      border: 1px solid rgba(165, 165, 224, 0.25);
      flex-shrink: 0;
    }

    header .right {
      display: flex;
      align-items: center;
      gap: 18px;
      transform-style: preserve-3d;
    }

    .nav-lines {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-lines b {
      display: block;
      height: 5px;
      border-radius: 4px;
      background: var(--lavender-soft);
    }

    .nav-lines b:nth-child(1) {
      width: 36px;
    }

    .nav-lines b:nth-child(2) {
      width: 44px;
    }

    .nav-lines b:nth-child(3) {
      width: 32px;
    }

    .nav-lines b:nth-child(4) {
      width: 40px;
    }

    .btn {
      height: 36px;
      min-width: 88px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--lavender-mid);
      border: none;
      box-shadow: 0 6px 16px rgba(165, 165, 224, 0.35);
    }

    .hero {
      display: flex;
      gap: 28px;
      align-items: stretch;
      margin-bottom: 36px;
      transform-style: preserve-3d;
    }

    .hero-visual {
      flex: 1.1;
      min-height: 200px;
      border-radius: var(--radius);
      background: linear-gradient(160deg, #ececff 0%, var(--lavender-soft) 100%);
      border: 1px solid rgba(165, 165, 224, 0.2);
      display: grid;
      place-items: center;
      padding: 24px;
      transform-style: preserve-3d;
    }

    .mountains {
      width: 82%;
      max-width: 220px;
      aspect-ratio: 4 / 3;
      position: relative;
    }

    .mountains svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-copy {
      flex: 0.95;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      padding-top: 8px;
      transform-style: preserve-3d;
    }

    .line {
      border-radius: 8px;
      background: var(--lavender-soft);
    }

    .line--title {
      height: 22px;
      width: 100%;
      max-width: 220px;
    }

    .line--body {
      height: 8px;
      width: 100%;
    }

    .line--body.short {
      max-width: 180px;
    }

    .hero-cta-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 6px;
      transform-style: preserve-3d;
    }

    .hero-cta-row .btn {
      min-width: 100px;
    }

    .line--link {
      height: 5px;
      width: 64px;
      border-radius: 4px;
      background: var(--lavender-mid);
      opacity: 0.65;
    }

    .features {
      display: flex;
      gap: 20px;
      transform-style: preserve-3d;
    }

    .feat {
      flex: 1;
      text-align: left;
      transform-style: preserve-3d;
    }

    .feat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(216, 216, 245, 0.9);
      border: 1px solid rgba(165, 165, 224, 0.28);
      display: grid;
      place-items: center;
      margin-bottom: 14px;
    }

    .feat-icon .geo {
      background: var(--lavender-mid);
    }

    .geo.square {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    .geo.circle {
      width: 17px;
      height: 17px;
      border-radius: 50%;
    }

    .geo.tri {
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 16px solid var(--lavender-mid);
      background: none !important;
    }

    .feat .line {
      height: 6px;
      margin-bottom: 8px;
    }

    .feat .line:last-child {
      width: 70%;
      margin-bottom: 0;
    }

    /* Z and opacity driven by JS from scroll (see script); keep 3D compositing hints */
    .fly {
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, opacity;
    }

    @media (prefers-reduced-motion: reduce) {
      .tilt {
        transform: none;
      }

      .fly {
        will-change: auto;
        opacity: 1 !important;
        transform: translate3d(0, 0, var(--rest-z, 0px)) !important;
      }
    }

    @media (max-width: 600px) {
      .tilt {
        transform: rotateY(-14deg) rotateX(9deg) rotateZ(-2deg);
      }

      .hero {
        flex-direction: column;
      }

      .nav-lines {
        display: none;
      }

      .features {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="scene">
      <div class="tilt">
        <div class="browser">
          <div class="browser-surface">
            <div
              class="browser-bar fly"
              style="--from-z:210px;--rest-z:8px;"
            >
              <div class="traffic" aria-hidden="true"><i></i><i></i><i></i></div>
              <div class="url"></div>
              <div class="browser-actions" aria-hidden="true">
                <span>+</span>
                <span>⋮</span>
              </div>
            </div>

            <div class="page">
              <header class="row">
                <div
                  class="logo fly"
                  style="--from-z:320px;--rest-z:38px;"
                ></div>
                <div class="right">
                  <div
                    class="nav-lines fly"
                    style="--from-z:270px;--rest-z:22px;"
                  >
                    <b></b><b></b><b></b><b></b>
                  </div>
                  <div
                    class="btn fly"
                    role="presentation"
                    style="--from-z:300px;--rest-z:34px;"
                  ></div>
                </div>
              </header>

              <section class="hero">
                <div
                  class="hero-visual fly"
                  style="--from-z:380px;--rest-z:18px;"
                >
                  <div class="mountains" aria-hidden="true">
                    <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                      <circle cx="150" cy="42" r="22" fill="#ebe9ff"/>
                      <path d="M-10 155 L52 72 L115 155 Z" fill="#c9c9ef"/>
                      <path d="M40 155 L112 54 L185 155 Z" fill="#b8b8e8"/>
                      <path d="M110 155 L165 92 L215 155 Z" fill="#d0d0f2"/>
                    </svg>
                  </div>
                </div>
                <div class="hero-copy">
                  <div
                    class="line line--title fly"
                    style="--from-z:340px;--rest-z:44px;"
                  ></div>
                  <div
                    class="line line--body fly"
                    style="--from-z:260px;--rest-z:28px;"
                  ></div>
                  <div
                    class="line line--body short fly"
                    style="--from-z:240px;--rest-z:20px;"
                  ></div>
                  <div class="hero-cta-row">
                    <div
                      class="btn fly"
                      style="--from-z:310px;--rest-z:36px;"
                    ></div>
                    <div
                      class="line line--link fly"
                      style="--from-z:280px;--rest-z:24px;"
                    ></div>
                  </div>
                </div>
              </section>

              <section class="features">
                <div
                  class="feat fly"
                  style="--from-z:350px;--rest-z:14px;"
                >
                  <div class="feat-icon"><span class="geo square"></span></div>
                  <div class="line"></div>
                  <div class="line"></div>
                </div>
                <div
                  class="feat fly"
                  style="--from-z:400px;--rest-z:10px;"
                >
                  <div class="feat-icon"><span class="geo circle"></span></div>
                  <div class="line"></div>
                  <div class="line"></div>
                </div>
                <div
                  class="feat fly"
                  style="--from-z:360px;--rest-z:6px;"
                >
                  <div class="feat-icon"><span class="geo tri"></span></div>
                  <div class="line"></div>
                  <div class="line"></div>
                </div>
              </section>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      var flies = Array.prototype.slice.call(document.querySelectorAll('.fly'));
      if (!flies.length) return;

      var reduce =
        typeof window.matchMedia === 'function' &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      function num(el, name, fallback) {
        var raw =
          el.style.getPropertyValue(name).trim() ||
          getComputedStyle(el).getPropertyValue(name).trim();
        var v = parseFloat(raw);
        return Number.isFinite(v) ? v : fallback;
      }

      function smoothstep(t) {
        t = Math.max(0, Math.min(1, t));
        return t * t * (3 - 2 * t);
      }

      if (reduce) return;

      /* 0 px offset: scroll/wheel progress 0 → fully “landed” with only --rest-z spread. */
      var SCROLL_OFFSET_PX = 0;
      /* How much scroll (px) takes progress from fully landed → fully “out”. */
      var SCROLL_RANGE_PX = 520;
      /* Narrow band so siblings react closer in scroll space */
      var STAGGER = 0.014;
      var SLOT = 0.065;

      var virtual = 0;
      var touchLastY = null;
      var raf = null;

      function totalPx() {
        return window.scrollY + window.pageYOffset + virtual;
      }

      /* 1 at scroll 0 → all at --rest-z; decreases as user scrolls / wheels forward */
      function globalProgress() {
        var u = (totalPx() + SCROLL_OFFSET_PX) / SCROLL_RANGE_PX;
        u = Math.max(0, Math.min(1, u));
        return 1 - u;
      }

      function apply() {
        raf = null;
        var p = globalProgress();

        flies.forEach(function (el, i) {
          var fromZ = num(el, '--from-z', 440);
          var restZ = num(el, '--rest-z', 0);
          var raw = (p - i * STAGGER) / SLOT;
          var t = smoothstep(raw);
          var z = fromZ + (restZ - fromZ) * t;
          el.style.opacity = String(t);
          el.style.transform = 'translate3d(0, 0, ' + z + 'px)';
        });
      }

      function schedule() {
        if (raf !== null) return;
        raf = requestAnimationFrame(function () {
          raf = null;
          apply();
        });
      }

      window.addEventListener('scroll', schedule, { passive: true });

      window.addEventListener(
        'wheel',
        function (e) {
          virtual += e.deltaY * 0.55;
          if (virtual < 0) virtual = 0;
          schedule();
        },
        { passive: true }
      );

      window.addEventListener(
        'touchstart',
        function (e) {
          if (!e.touches.length) return;
          touchLastY = e.touches[0].clientY;
        },
        { passive: true }
      );

      window.addEventListener(
        'touchmove',
        function (e) {
          if (!e.touches.length || touchLastY == null) return;
          var y = e.touches[0].clientY;
          virtual += (touchLastY - y) * 1.15;
          if (virtual < 0) virtual = 0;
          touchLastY = y;
          schedule();
        },
        { passive: true }
      );

      window.addEventListener('touchend', function () {
        touchLastY = null;
      });

      apply();
    })();
  </script>
</body>
</html>
